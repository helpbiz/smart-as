version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: smartas-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - smartas-network

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: smartas-backend
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - SERVER_PORT=8088
    volumes:
      - ./data/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - smartas-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: smartas-frontend
    environment:
      - VITE_API_BASE_URL=/api/v1
    restart: unless-stopped
    networks:
      - smartas-network

  customer-app:
    build:
      context: ..
      dockerfile: docker/customer-app.Dockerfile
    container_name: smartas-customer-app
    environment:
      - API_BASE_URL=https://foryouelec.co.kr/api/v1
    restart: unless-stopped
    networks:
      - smartas-network

  technician-app:
    build:
      context: ..
      dockerfile: docker/technician-app.Dockerfile
    container_name: smartas-technician-app
    environment:
      - API_BASE_URL=https://foryouelec.co.kr/api/v1
    restart: unless-stopped
    networks:
      - smartas-network

networks:
  smartas-network:
    driver: bridge
