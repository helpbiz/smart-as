server {
    listen 80;
    listen [::]:80;
    server_name asas.foryouelec.co.kr;

    # ACME 챌린지 (SSL 인증서용)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri $uri/ =404;
    }

    # HTTP → HTTPS 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name asas.foryouelec.co.kr;

    # SSL 인증서는 certbot이 자동으로 설정
    ssl_certificate /etc/letsencrypt/live/asas.foryouelec.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asas.foryouelec.co.kr/privkey.pem;

    # SSL 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ACME 챌린지
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri $uri/ =404;
    }

    # Expo 앱 (포트 8083)
    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # JS/CSS 캐시 방지
    location ~* \.(js|css)$ {
        proxy_pass http://127.0.0.1:8083;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires 0;
    }

    # 백엔드 API (포트 8088)
    location /api {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
